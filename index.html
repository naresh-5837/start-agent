<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoho Start — LLC Formation Assistant</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Outfit', sans-serif; background: #F8F7FC; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #C7C4D4; border-radius: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    input::placeholder { color: #A0A0B0; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse3 { 0%,80%,100% { transform:scale(0); } 40% { transform:scale(1); } }
    @keyframes popIn { 0% { opacity:0; transform:scale(0.9); } 100% { opacity:1; transform:scale(1); } }
    @keyframes gradShift { 0% { background-position:0% 50%; } 50% { background-position:100% 50%; } 100% { background-position:0% 50%; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    "use strict";
    var h = React.createElement;
    var useState = React.useState;
    var useRef = React.useRef;
    var useEffect = React.useEffect;
    var useCallback = React.useCallback;

    var MODEL_FAST = "claude-haiku-4-5-20251001";
    var MODEL_SMART = "claude-sonnet-4-20250514";

    var SYSTEM_EDUCATION = "You are the Zoho Start Business Formation Assistant. Answer questions about LLCs, business formation, EINs, registered agents, etc. Be concise (2-3 paragraphs max), warm, and helpful.\n\nKey facts:\n- LLC = Limited Liability Company. Protects personal assets. Pass-through taxation.\n- Needs: Articles of Organization, Operating Agreement (recommended), Registered Agent, EIN.\n- Why LLC? Asset protection, tax flexibility, credibility, simplicity, management flexibility.\n- EIN = Employer Identification Number (9-digit, from IRS). For bank accounts, hiring, taxes.\n- Registered Agent = person/company in formation state accepting legal docs. No P.O. Box. Required.\n- NAICS = North American Industry Classification System code for your business sector.\n- Zoho Start: $0 starter plan + state filing fee. EIN add-on $49. US only. Integrates with Zoho Voice & Domains.\n- Popular states: Home state (simplest), Delaware (business-friendly), Wyoming (no income tax), Nevada (privacy).\n- Operating Agreement: internal doc outlining management, profit splits, responsibilities. Recommended.\n- Articles of Organization: primary legal doc filed with state to create LLC.\n- You're NOT a lawyer \u2014 mention this when discussing legal specifics.\n\nIf the user wants to start registration, tell them to click \"I'd like to register my LLC\" or just say so.";

    var SYSTEM_REGISTRATION = "You are the Zoho Start registration assistant collecting LLC formation info through chat. Be brief, warm, and efficient. Ask 2-4 related fields per message.\n\n### Collection order:\n1. **Start**: Formation state + confirm LLC.\n2. **Contact**: First/Last Name, Email, Phone. Then address (street1, street2 optional, city, state, zip).\n3. **Company**: LLC name, suffix (LLC/L.L.C./Limited Liability Company/L.C./Ltd. Co./Ltd Company/Limited Company), industry (suggest NAICS code), brief description.\n4. **Company Address**: ASK to reuse contact address. If no, collect street1, street2, city, state, zip, county.\n5. **Members**: How many? Each: Individual/Company, name, contact, ownership%, over-18 confirm. ASK to reuse contact info for member 1. Total must = 100%.\n6. **Registered Agent**: Briefly explain (person/company in formation state to accept legal docs). Individual/Company, name, address (must be in formation state). ASK reuse. Get consent confirmation.\n7. **EIN**: Zoho ($49) or self? If Zoho: legal name (ASK reuse), SSN or ITIN (remind: handled securely), mailing address (ASK reuse), 5 yes/no questions (heavy vehicle 55k+lbs, gambling, Form 720, alcohol/tobacco/firearms, W-2 employees in next 12 months), authorization confirm. Mask SSN in summary as ***-**-XXXX.\n8. **Review**: Show complete summary. Ask to confirm.\n\n### Rules:\n- Check conversation history \u2014 NEVER re-ask what the user already provided.\n- ASK before reusing info: \"Want to use the same [name/address] from earlier?\"\n- Keep responses SHORT: confirm what you got \u2192 ask next questions. No long explanations.\n- If ownership doesn't total 100%, ask to correct.\n- When user confirms final summary, end with EXACTLY on its own line:\n<<<REGISTRATION_COMPLETE>>>";

    var REG_PHRASES = ["register","form my llc","start my llc","form an llc","i'd like to register","let's start","begin registration","i want to start","i want to form","start registration","ready to register","sign up","let's do it","proceed with registration"];

    function isRegistrationMode(messages) {
      var text = messages.map(function(m) { return m.content; }).join("\n").toLowerCase();
      return REG_PHRASES.some(function(p) { return text.includes(p); });
    }

    var WELCOME_MSG = {
      role: "assistant",
      content: "Welcome to the **Zoho Start Business Guide!** I'm here to help you start your LLC.\n\n\u2192 **Learn about LLCs** \u2014 what they are, why you need one, costs, states, and more\n\u2192 **Register your LLC** \u2014 I'll collect your info step by step through this chat\n\nAsk me anything, or say **\"I'd like to register my LLC\"** to get started!"
    };

    var QUICK_PROMPTS = [
      "What is an LLC and why do I need one?",
      "Which state should I form my LLC in?",
      "How much does it cost?",
      "I'd like to register my LLC"
    ];

    function TypingDots() {
      return h("div", { style: { display:"flex", gap:5, padding:"10px 0", alignItems:"center" } },
        [0,1,2].map(function(i) {
          return h("div", { key:i, style: {
            width:7, height:7, borderRadius:"50%", background:"#6C63FF",
            animation:"pulse3 1.4s infinite ease-in-out both",
            animationDelay: i*0.16+"s"
          }});
        })
      );
    }

    function formatMsg(text) {
      var c = text.replace(/<<<REGISTRATION_COMPLETE>>>/g, "").trim();
      var r = c.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      r = r.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:#6C63FF;text-decoration:underline;">$1</a>');
      r = r.replace(/^\u2192 /gm, '<span style="color:#6C63FF;margin-right:4px;">\u2192</span>');
      r = r.replace(/^(\d+)\.\s/gm, '<span style="color:#6C63FF;font-weight:600;margin-right:2px;">$1.</span> ');
      r = r.replace(/\n/g, '<br/>');
      return r;
    }

    function ChatBubble(props) {
      var msg = props.msg, isLast = props.isLast;
      var isUser = msg.role === "user";
      var children = [];
      if (!isUser) {
        children.push(h("div", { key:"av", style: {
          width:32, height:32, borderRadius:10, marginRight:10, marginTop:2, flexShrink:0,
          background:"linear-gradient(135deg,#6C63FF,#8B83FF)",
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:13, color:"#fff", fontWeight:700,
          boxShadow:"0 2px 6px rgba(108,99,255,0.18)"
        }}, "Z"));
      }
      children.push(h("div", { key:"bb", style: {
        maxWidth:"80%", padding:"12px 16px", fontSize:14, lineHeight:1.65,
        borderRadius: isUser ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
        background: isUser ? "linear-gradient(135deg,#6C63FF,#8B83FF)" : "#fff",
        color: isUser ? "#fff" : "#2D2B3D",
        boxShadow: isUser ? "0 2px 8px rgba(108,99,255,0.16)" : "0 1px 4px rgba(0,0,0,0.05)",
        fontFamily:"'Outfit',sans-serif"
      }, dangerouslySetInnerHTML: { __html: formatMsg(msg.content) } }));
      return h("div", { style: {
        display:"flex", justifyContent: isUser ? "flex-end" : "flex-start",
        marginBottom:14, animation: isLast ? "fadeUp 0.25s ease-out" : "none"
      }}, children);
    }

    function ModelBadge(props) {
      var isHaiku = props.model === MODEL_FAST;
      return h("span", { style: {
        padding:"3px 8px", borderRadius:5, fontSize:10, fontWeight:600,
        fontFamily:"'Outfit',sans-serif", letterSpacing:"0.03em",
        background: isHaiku ? "#ECFDF5" : "#EDE9FE",
        color: isHaiku ? "#059669" : "#6C63FF"
      }}, isHaiku ? "\u26A1 HAIKU" : "\uD83E\uDDE0 SONNET");
    }

    function SubmitBanner(props) {
      if (props.submitted) {
        return h("div", { style: {
          margin:"12px 0 14px", padding:24,
          background:"linear-gradient(135deg,#ECFDF5,#D1FAE5)",
          borderRadius:14, textAlign:"center",
          animation:"popIn 0.4s ease-out", border:"1px solid #A7F3D0"
        }},
          h("div", { style:{ fontSize:40, marginBottom:8 } }, "\uD83C\uDF89"),
          h("div", { style:{ fontFamily:"'Newsreader',serif", fontSize:20, fontWeight:600, color:"#065F46", marginBottom:6 } }, "Application Submitted Successfully!"),
          h("div", { style:{ fontSize:13, color:"#047857", lineHeight:1.6 }, dangerouslySetInnerHTML:{ __html:"Your LLC formation request has been sent to the Zoho Start team.<br/>You'll receive email updates on your application status." } }),
          h("a", { href:"https://www.zoho.com/start/", target:"_blank", rel:"noopener noreferrer", style:{
            display:"inline-block", marginTop:14, padding:"10px 24px",
            background:"#059669", color:"#fff", borderRadius:10,
            fontSize:13, fontWeight:600, textDecoration:"none", fontFamily:"'Outfit',sans-serif"
          }}, "Visit Zoho Start Dashboard \u2192")
        );
      }
      return h("div", { style: {
        margin:"12px 0 14px", padding:20,
        background:"linear-gradient(135deg,#F5F3FF,#EDE9FE)",
        borderRadius:14, textAlign:"center",
        animation:"popIn 0.4s ease-out", border:"1px solid #DDD6FE"
      }},
        h("div", { style:{ fontSize:28, marginBottom:6 } }, "\uD83D\uDCCB"),
        h("div", { style:{ fontFamily:"'Newsreader',serif", fontSize:18, fontWeight:600, color:"#4338CA", marginBottom:6 } }, "Ready to Submit Your Application"),
        h("div", { style:{ fontSize:13, color:"#6B7280", marginBottom:14, lineHeight:1.5 } }, "All information collected. Click below to send your LLC formation request to the Zoho Start team."),
        h("button", { onClick:props.onSubmit, style:{
          padding:"12px 32px", borderRadius:10,
          background:"linear-gradient(135deg,#6C63FF,#8B83FF)",
          color:"#fff", border:"none", cursor:"pointer",
          fontSize:15, fontWeight:600, fontFamily:"'Outfit',sans-serif",
          boxShadow:"0 4px 14px rgba(108,99,255,0.3)", transition:"all 0.2s"
        },
        onMouseEnter:function(e){ e.target.style.transform="translateY(-1px)"; },
        onMouseLeave:function(e){ e.target.style.transform="translateY(0)"; }
        }, "\u2713 Submit to Zoho Start")
      );
    }

    function App() {
      var s1=useState([WELCOME_MSG]), messages=s1[0], setMessages=s1[1];
      var s2=useState(""), input=s2[0], setInput=s2[1];
      var s3=useState(false), loading=s3[0], setLoading=s3[1];
      var s4=useState(true), showPrompts=s4[0], setShowPrompts=s4[1];
      var s5=useState(false), regComplete=s5[0], setRegComplete=s5[1];
      var s6=useState(false), submitted=s6[0], setSubmitted=s6[1];
      var s7=useState(null), lastModel=s7[0], setLastModel=s7[1];
      var chatEndRef=useRef(null), inputRef=useRef(null);

      var scrollToBottom=useCallback(function(){
        setTimeout(function(){ if(chatEndRef.current) chatEndRef.current.scrollIntoView({behavior:"smooth"}); },50);
      },[]);

      useEffect(function(){ scrollToBottom(); },[messages,loading,regComplete,submitted,scrollToBottom]);

      var sendMessage=function(text){
        var userMsg={role:"user",content:text};
        var all=messages.concat([userMsg]);
        setMessages(all); setInput(""); setShowPrompts(false); setLoading(true);
        var reg=isRegistrationMode(all);
        var model=reg?MODEL_FAST:MODEL_SMART;
        var sys=reg?SYSTEM_REGISTRATION:SYSTEM_EDUCATION;
        setLastModel(model);
        var apiMsgs=all.map(function(m){return{role:m.role,content:m.content};});
        fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({model:model,max_tokens:reg?600:800,system:sys,messages:apiMsgs})
        })
        .then(function(r){return r.json();})
        .then(function(data){
          var reply=(data.content&&data.content.filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n"))||"Sorry, something went wrong. Could you try again?";
          if(reply.includes("<<<REGISTRATION_COMPLETE>>>")) setRegComplete(true);
          setMessages(function(p){return p.concat([{role:"assistant",content:reply}]);});
        })
        .catch(function(err){
          console.error("API error:",err);
          setMessages(function(p){return p.concat([{role:"assistant",content:"Oops \u2014 I ran into an error. Could you try that again?"}]);});
        })
        .finally(function(){ setLoading(false); if(inputRef.current) inputRef.current.focus(); });
      };

      var handleSubmit=function(ev){ if(ev) ev.preventDefault(); if(!input.trim()||loading) return; sendMessage(input.trim()); };

      var header=h("div",{style:{padding:"12px 20px",background:"#fff",borderBottom:"1px solid #EEEDF2",display:"flex",alignItems:"center",gap:12,flexShrink:0}},
        h("div",{style:{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#6C63FF 0%,#8B83FF 50%,#A78BFA 100%)",backgroundSize:"200% 200%",animation:"gradShift 6s ease infinite",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 3px 10px rgba(108,99,255,0.18)"}},
          h("svg",{width:"20",height:"20",viewBox:"0 0 24 24",fill:"none",dangerouslySetInnerHTML:{__html:'<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'}})
        ),
        h("div",{style:{flex:1}},
          h("div",{style:{fontFamily:"'Newsreader',serif",fontSize:17,fontWeight:600,color:"#2D2B3D"}},"Zoho Start"),
          h("div",{style:{fontSize:11.5,color:"#A0A0B0",display:"flex",alignItems:"center",gap:5}},
            h("span",{style:{width:6,height:6,borderRadius:"50%",background:"#34D399",display:"inline-block"}}),
            "LLC Formation Assistant"
          )
        ),
        lastModel?h(ModelBadge,{model:lastModel}):null,
        h("a",{href:"https://www.zoho.com/start/",target:"_blank",rel:"noopener noreferrer",style:{padding:"8px 16px",background:"#6C63FF",color:"#fff",borderRadius:9,fontSize:12.5,fontWeight:600,textDecoration:"none",fontFamily:"'Outfit',sans-serif",transition:"all 0.2s",boxShadow:"0 2px 6px rgba(108,99,255,0.16)"},onMouseEnter:function(e){e.target.style.background="#5B52E5";},onMouseLeave:function(e){e.target.style.background="#6C63FF";}},"zoho.com/start \u2197")
      );

      var chatKids=messages.map(function(msg,i){return h(ChatBubble,{key:i,msg:msg,isLast:i===messages.length-1});});
      if(loading){
        chatKids.push(h("div",{key:"ld",style:{display:"flex",alignItems:"flex-start",gap:10,marginBottom:14}},
          h("div",{style:{width:32,height:32,borderRadius:10,background:"linear-gradient(135deg,#6C63FF,#8B83FF)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:13,color:"#fff",fontWeight:700,boxShadow:"0 2px 6px rgba(108,99,255,0.18)"}},"Z"),
          h("div",{style:{padding:"12px 16px",borderRadius:"18px 18px 18px 4px",background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}},h(TypingDots))
        ));
      }
      if(regComplete){
        chatKids.push(h(SubmitBanner,{key:"sb",onSubmit:function(){setSubmitted(true);console.log("Submitted.",messages);},submitted:submitted}));
      }
      chatKids.push(h("div",{key:"end",ref:chatEndRef}));

      var chatArea=h("div",{style:{flex:1,overflowY:"auto",padding:"20px 20px 10px"}},chatKids);

      var qp=null;
      if(showPrompts){
        qp=h("div",{style:{padding:"0 20px 8px",display:"flex",flexWrap:"wrap",gap:7,animation:"fadeUp 0.4s ease-out"}},
          QUICK_PROMPTS.map(function(p,i){
            return h("button",{key:i,onClick:function(){sendMessage(p);},style:{padding:"9px 14px",borderRadius:20,border:"1.5px solid #EEEDF2",background:"#fff",color:"#2D2B3D",fontSize:12.5,fontWeight:500,cursor:"pointer",fontFamily:"'Outfit',sans-serif",transition:"all 0.2s",whiteSpace:"nowrap",boxShadow:"0 1px 3px rgba(0,0,0,0.03)"},
            onMouseEnter:function(e){e.target.style.borderColor="#6C63FF";e.target.style.color="#6C63FF";e.target.style.background="#F5F3FF";},
            onMouseLeave:function(e){e.target.style.borderColor="#EEEDF2";e.target.style.color="#2D2B3D";e.target.style.background="#fff";}
            },p);
          })
        );
      }

      var inputBar=h("div",{style:{padding:"10px 20px 16px",background:"#fff",borderTop:"1px solid #EEEDF2",flexShrink:0}},
        h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
          h("input",{ref:inputRef,type:"text",value:input,
            onChange:function(e){setInput(e.target.value);},
            onKeyDown:function(e){if(e.key==="Enter")handleSubmit();},
            placeholder:submitted?"Application submitted! Ask me anything else...":regComplete?"Review above and submit, or ask anything...":"Type your message...",
            disabled:loading,
            style:{flex:1,padding:"12px 16px",borderRadius:12,border:"1.5px solid #EEEDF2",fontSize:14,fontFamily:"'Outfit',sans-serif",color:"#2D2B3D",outline:"none",background:"#FAFAFE",transition:"all 0.2s"},
            onFocus:function(e){e.target.style.borderColor="#6C63FF";e.target.style.background="#fff";e.target.style.boxShadow="0 0 0 3px rgba(108,99,255,0.08)";},
            onBlur:function(e){e.target.style.borderColor="#EEEDF2";e.target.style.background="#FAFAFE";e.target.style.boxShadow="none";}
          }),
          h("button",{onClick:handleSubmit,disabled:loading||!input.trim(),style:{width:44,height:44,borderRadius:12,border:"none",background:(!input.trim()||loading)?"#E5E4EB":"linear-gradient(135deg,#6C63FF,#8B83FF)",color:"#fff",cursor:(!input.trim()||loading)?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s",boxShadow:(!input.trim()||loading)?"none":"0 2px 8px rgba(108,99,255,0.18)"}},
            h("svg",{width:"18",height:"18",viewBox:"0 0 24 24",fill:"none",dangerouslySetInnerHTML:{__html:'<path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'}})
          )
        ),
        h("div",{style:{textAlign:"center",marginTop:9,fontSize:10.5,color:"#B0AFBC"},dangerouslySetInnerHTML:{__html:'Powered by Claude &middot; General guidance only &mdash; not legal advice &middot; <a href="https://www.zoho.com/start/" target="_blank" rel="noopener" style="color:#6C63FF;text-decoration:none;">zoho.com/start</a>'}})
      );

      return h("div",{style:{fontFamily:"'Outfit',sans-serif",height:"100vh",display:"flex",flexDirection:"column",background:"#F8F7FC",overflow:"hidden"}},header,chatArea,qp,inputBar);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
